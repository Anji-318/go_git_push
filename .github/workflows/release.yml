name: Release Git Push Tool

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.1.0)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  # ==================== 构建阶段 ====================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows - 在 Ubuntu 上交叉编译
          - target: windows-amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: .exe
            cgo: 0
          - target: windows-arm64
            runner: ubuntu-latest
            goos: windows
            goarch: arm64
            ext: .exe
            cgo: 0
          # Linux
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            cgo: 0
          - target: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ''
            cgo: 0
          # macOS
          - target: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ''
            cgo: 0
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            cgo: 0
          # Android (Termux) - 纯 Go 编译，无需 NDK
          - target: android-arm64
            runner: ubuntu-latest
            goos: android
            goarch: arm64
            ext: ''
            cgo: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA="${{ github.sha }}"

          LDFLAGS="-s -w -X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME -X main.CommitSHA=$COMMIT_SHA"

          OUTPUT_NAME="git-push-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"

          echo "Building: $OUTPUT_NAME"
          echo "GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=$CGO_ENABLED"

          go build -ldflags "$LDFLAGS" -o "$OUTPUT_NAME" .

      - name: Test binary (Linux amd64 native)
        if: matrix.target == 'linux-amd64'
        run: |
          file git-push-linux-amd64
          ./git-push-linux-amd64 --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-push-${{ matrix.goos }}-${{ matrix.goarch }}
          path: git-push-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 1

  # ==================== 发布阶段 ====================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Package binaries
        run: |
          mkdir -p release

          for dir in artifacts/*/; do
            binary=$(find "$dir" -type f | head -1)
            if [ -n "$binary" ]; then
              filename=$(basename "$binary")
              base="${filename%.*}"

              if [[ "$filename" == *.exe ]]; then
                zip -j "release/${base}.zip" "$binary"
                echo "Packaged: ${base}.zip"
              else
                tar -czf "release/${base}.tar.gz" -C "$(dirname "$binary")" "$(basename "$binary")"
                echo "Packaged: ${base}.tar.gz"
              fi

              cp "$binary" "release/$filename"
            fi
          done

          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Get version info
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Git Push Tool ${{ steps.version.outputs.version }}
          body: |
            ## Git Push Tool ${{ steps.version.outputs.version }}

            交互式 Git 管理终端工具，支持方向键导航、Token 自动注入、提交历史重写。

            ### 支持平台
            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Windows | x64 | `git-push-windows-amd64.exe` |
            | Windows | ARM64 | `git-push-windows-arm64.exe` |
            | Linux | x64 | `git-push-linux-amd64` |
            | Linux | ARM64 | `git-push-linux-arm64` |
            | macOS | x64 | `git-push-darwin-amd64` |
            | macOS | ARM64 (Apple Silicon) | `git-push-darwin-arm64` |
            | Android | ARM64 (Termux) | `git-push-android-arm64` |

            ### 快速开始
            ```bash
            # 下载对应平台的二进制文件
            # 赋予执行权限（Linux/macOS/Android）
            chmod +x git-push-*

            # 运行
            ./git-push-*
            ```

            ### 配置文件
            首次运行会在项目目录自动生成 `git-config.txt`：
            ```
            GITHUB_USERNAME=your_username
            GITHUB_TOKEN=ghp_xxxxxxxxxxxxxxxxxxxx
            REPO_URL=https://github.com/your_username/your_repo.git
            ```

            ### 校验和
            见 `checksums-sha256.txt`
          files: |
            release/git-push-*
            release/checksums-sha256.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
